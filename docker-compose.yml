services:
  db:
    image: postgres:17-alpine
    container_name: community-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: community
      POSTGRES_PASSWORD: community_dev_pw
      POSTGRES_DB: community
    ports:
      - "5432:5432"
    volumes:
      - community-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U community -d community"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  community-pgdata:
